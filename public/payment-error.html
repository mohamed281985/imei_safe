<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>فشل الدفع</title>
  <style>
    body {
      font-family: 'Tajawal', Arial, sans-serif;
      background: #f8d7da;
      color: #721c24;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .container {
      background: #fff;
      border: 1px solid #f5c6cb;
      border-radius: 12px;
      padding: 32px 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      text-align: center;
    }
    h1 {
      color: #c82333;
      margin-bottom: 16px;
    }
    p {
      margin-bottom: 24px;
      font-size: 1.1em;
    }
    button {
      background: #c82333;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 12px 32px;
      font-size: 1.1em;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover {
      background: #a71d2a;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>فشل الدفع</h1>
    <p>عذراً، لم تكتمل عملية الدفع بنجاح.<br>يرجى المحاولة مرة أخرى أو التأكد من بيانات البطاقة.</p>
    <button onclick="goBack()">العودة إلى لوحة التحكم</button>
  </div>
  <script>
    function goBack() {
      window.location.href = 'https://imei-safe.me/dashboard'; // توجيه إلى لوحة التحكم
    }
  </script>
</body>
</html>
